<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Закавычник</title>
    <meta name="description" content="Закавычник строк во фразовое или точное соответствие. Не меняет регистра букв. Просто и удобно. Попробуйте!"/>
    <script src="script.js" defer></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="quote.png">
</head>
<body>
    <div class="topnav">
        <a class="active" href="index.html">Закавычник</a>
        <a href="capiralizator.html">Капитализатор</a>
        <a href="undublicator.html">Дубликаты</a>
        <a href="minusator.html">Минусатор</a>
        <a href="decline.html">Склонятор</a>
    </div>

    <div class="content">
        <h1>Закавычник</h1>
        <textarea id="input" placeholder="Введите текст"></textarea>
        <div>
            <select id="mode">
                <option value="phrase">Фразовое</option>
                <option value="exact">Точное</option>
            </select>
            <button id="button-quote">Закавычить</button>
        </div>
        <textarea id="result" readonly></textarea>
        <div>
            <button id="copy">Копировать</button>
            <button id="clear">Очистить</button>
        </div>
    </div>
    <footer>
        <p>2025 - Tools for PPС daily routine. Made for fun. AI power.</p>
    </footer>
    <div id="feedbackModal" class="feedback-modal hidden">
      <div class="feedback-content">
        <button class="feedback-close" id="feedbackClose">✕</button>
    
        <h3>Предложить улучшение</h3>
    
        <form id="feedbackForm">
          <textarea 
            id="feedbackComment" 
            name="comment" 
            placeholder="Ваш комментарий"
            required>
          </textarea>
    
          <input 
            type="text" 
            id="feedbackContact" 
            name="contact" 
            placeholder="Контакт для обратной связи (необязательно)"
          />
    
          <button type="submit" class="feedback-submit">
            Отправить
          </button>
        </form>
    
        <div id="feedbackMessage" class="feedback-message"></div>
      </div>
    </div>
    
</body>
</html>
