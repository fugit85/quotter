    <meta name="description" content="Склонение слов по падежам, родам онлайн. Просто и удобно. Попробуйте!"/>
    <script src="script.js" defer></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

    <div class="topnav">

    <div class="content">
        <h1>Склонятор</h1>
        <textarea id="input" placeholder="Введите текст"></textarea>
        <div class="decline-option">
            <label><input type="checkbox" id="byAll" checked onchange="toggleOptions(this)"> Все</label>
            <label><input type="checkbox" id="byGender" onchange="toggleOptions()"> Рода</label>
            <label><input type="checkbox" id="byNumber" onchange="toggleOptions()"> Числа</label>
            <label><input type="checkbox" id="byCase" onchange="toggleOptions()"> Падежи</label>
        </div>
        <button id="button-inflect">Склонять</button>
        <textarea id="result" readonly></textarea>
        <div>
            <button id="copy">Копировать</button>
            <button id="clear">Очистить</button>
        </div>
    </div>
    <footer>
        <p>2025 - Tools for PPС daily routine. Made for fun. AI power.</p>
    </footer>
